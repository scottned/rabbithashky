events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 8080;
    server_name rabbithashky.org www.rabbithashky.org;
    root /usr/share/nginx/html;
    index index.html;

    # Canonical redirect: www → non-www
    if ($host = 'www.rabbithashky.org') {
      return 301 https://rabbithashky.org$request_uri;
    }

    location / {
      try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(html|css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
  }
}
