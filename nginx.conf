server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(css|js|png|jpg|jpeg|webp|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
