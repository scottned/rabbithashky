<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- Background card - slightly regal -->
  <rect width="400" height="420" fill="#f5f0f8" rx="20"/>
  <rect x="2" y="2" width="396" height="416" fill="none" stroke="#2e6e2e" stroke-width="3" rx="19"/>

  <!-- Header -->
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2e6e2e" font-weight="bold" letter-spacing="2">RABBIT HASH, KY</text>
  <line x1="40" y1="46" x2="360" y2="46" stroke="#2e6e2e" stroke-width="1" opacity="0.4"/>

  <!-- Body - border collie, black/white -->
  <ellipse cx="200" cy="310" rx="85" ry="62" fill="#1e1e1e"/>
  <!-- White chest blaze -->
  <ellipse cx="200" cy="305" rx="38" ry="45" fill="#f0f0f0"/>
  <!-- Jacket -->
  <path d="M 155 280 L 183 305 L 200 295 L 217 305 L 245 280 Z" fill="#2e6e2e"/>
  <path d="M 183 305 L 200 328 L 217 305 L 200 295 Z" fill="white"/>
  <!-- Pearl necklace (first female mayor!) -->
  <path d="M 168 270 Q 200 280 232 270" stroke="none" fill="none"/>
  <circle cx="172" cy="271" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="183" cy="275" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="195" cy="277" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="207" cy="277" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="219" cy="275" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>
  <circle cx="230" cy="271" r="5" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Mayor medal -->
  <circle cx="200" cy="333" r="13" fill="#d4a12a" stroke="#b8871a" stroke-width="2"/>
  <text x="200" y="338" text-anchor="middle" font-size="13">🐾</text>

  <!-- Head - border collie, alert, intelligent look -->
  <ellipse cx="200" cy="180" rx="76" ry="70" fill="#1e1e1e"/>
  <!-- White blaze on face -->
  <path d="M 200 122 Q 192 140 190 165 Q 189 190 192 210 Q 196 225 200 228 Q 204 225 208 210 Q 211 190 210 165 Q 208 140 200 122 Z" fill="#f0f0f0"/>

  <!-- Ears - border collie semi-erect with tips folded -->
  <path d="M 132 148 Q 118 130 122 155 Q 126 175 135 185 Q 145 195 152 185 Q 158 170 150 152 Z" fill="#1e1e1e"/>
  <path d="M 268 148 Q 282 130 278 155 Q 274 175 265 185 Q 255 195 248 185 Q 242 170 250 152 Z" fill="#1e1e1e"/>
  <!-- Ear tips slightly folded forward -->
  <path d="M 132 148 Q 118 130 122 148 Q 126 155 136 152 Z" fill="#3a3a3a"/>
  <path d="M 268 148 Q 282 130 278 148 Q 274 155 264 152 Z" fill="#3a3a3a"/>

  <!-- Eyes - border collie bright, intelligent -->
  <circle cx="172" cy="172" r="15" fill="white"/>
  <circle cx="228" cy="172" r="15" fill="white"/>
  <circle cx="175" cy="174" r="10" fill="#4a6a20"/>
  <circle cx="231" cy="174" r="10" fill="#4a6a20"/>
  <circle cx="173" cy="171" r="15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="229" cy="171" r="15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="178" cy="171" r="4" fill="white"/>
  <circle cx="234" cy="171" r="4" fill="white"/>

  <!-- Snout - narrower, border collie -->
  <ellipse cx="200" cy="207" rx="28" ry="22" fill="#f0f0f0"/>
  <!-- Nose -->
  <ellipse cx="200" cy="198" rx="12" ry="9" fill="#1a1a1a"/>
  <ellipse cx="197" cy="196" rx="4" ry="2.5" fill="#3a3a3a" opacity="0.5"/>
  <!-- Mouth - slight smile -->
  <path d="M 187 215 Q 200 224 213 215" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="200" cy="221" rx="8" ry="6" fill="#e05555"/>

  <!-- Eyebrows - white/light -->
  <path d="M 159 158 Q 172 151 185 157" stroke="#d0d0d0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 215 157 Q 228 151 241 158" stroke="#d0d0d0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Footer -->
  <path d="M 0 368 L 400 368 L 400 420 Q 200 420 200 420 Q 0 420 0 420 Z" fill="#2e6e2e"/>
  <text x="200" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white">MAYOR 2008–2016</text>
  <text x="200" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#b8d8b8">Lucy Lou · Border Collie · 1st Female Mayor</text>
</svg>
