<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- Background card -->
  <rect width="400" height="420" fill="#f1f7f1" rx="20"/>
  <rect x="2" y="2" width="396" height="416" fill="none" stroke="#2e6e2e" stroke-width="3" rx="19"/>

  <!-- Header -->
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2e6e2e" font-weight="bold" letter-spacing="2">RABBIT HASH, KY</text>
  <line x1="40" y1="46" x2="360" y2="46" stroke="#2e6e2e" stroke-width="1" opacity="0.4"/>

  <!-- Body -->
  <ellipse cx="200" cy="310" rx="85" ry="65" fill="#c8a060"/>
  <!-- Jacket / lapels -->
  <path d="M 155 280 L 185 305 L 200 295 L 215 305 L 245 280 Z" fill="#2e6e2e"/>
  <path d="M 185 305 L 200 330 L 215 305 L 200 295 Z" fill="white"/>
  <!-- Bow tie -->
  <polygon points="182,287 196,295 182,303" fill="#a84e28"/>
  <polygon points="218,287 204,295 218,303" fill="#a84e28"/>
  <circle cx="200" cy="295" r="6" fill="#a84e28"/>

  <!-- Mayor medal -->
  <circle cx="200" cy="335" r="13" fill="#d4a12a" stroke="#b8871a" stroke-width="2"/>
  <text x="200" y="340" text-anchor="middle" font-size="13">🐾</text>

  <!-- Head - mixed breed, floppy eared -->
  <ellipse cx="200" cy="185" rx="78" ry="72" fill="#c8a060"/>

  <!-- Floppy ears - long drooping -->
  <path d="M 128 165 Q 100 175 105 225 Q 108 245 125 250 Q 140 252 148 230 Q 155 205 145 175 Z" fill="#b08040"/>
  <path d="M 272 165 Q 300 175 295 225 Q 292 245 275 250 Q 260 252 252 230 Q 245 205 255 175 Z" fill="#b08040"/>
  <path d="M 132 170 Q 108 178 112 220 Q 115 237 128 240 Q 140 242 146 222 Q 151 200 143 175 Z" fill="#e8c898" opacity="0.7"/>
  <path d="M 268 170 Q 292 178 288 220 Q 285 237 272 240 Q 260 242 254 222 Q 249 200 257 175 Z" fill="#e8c898" opacity="0.7"/>

  <!-- Eyes - warm brown mixed breed -->
  <circle cx="173" cy="178" r="15" fill="white"/>
  <circle cx="227" cy="178" r="15" fill="white"/>
  <circle cx="176" cy="180" r="10" fill="#5a3a18"/>
  <circle cx="230" cy="180" r="10" fill="#5a3a18"/>
  <circle cx="173" cy="177" r="13" fill="none" stroke="#3a2510" stroke-width="1.5"/>
  <circle cx="227" cy="177" r="13" fill="none" stroke="#3a2510" stroke-width="1.5"/>
  <circle cx="178" cy="177" r="4" fill="white"/>
  <circle cx="232" cy="177" r="4" fill="white"/>

  <!-- Snout -->
  <ellipse cx="200" cy="210" rx="32" ry="24" fill="#d8b07a"/>
  <!-- Nose -->
  <ellipse cx="200" cy="200" rx="14" ry="10" fill="#2a1808"/>
  <ellipse cx="196" cy="197" rx="4" ry="3" fill="#5a3828" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M 186 218 Q 200 228 214 218" stroke="#2a1808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="200" cy="225" rx="9" ry="7" fill="#e05555"/>

  <!-- Eyebrows - friendly raised -->
  <path d="M 160 163 Q 173 156 186 162" stroke="#7a5530" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 214 162 Q 227 156 240 163" stroke="#7a5530" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Footer -->
  <rect x="0" y="368" width="400" height="52" fill="#2e6e2e" rx="0"/>
  <rect x="0" y="368" width="400" height="52" fill="#2e6e2e"/>
  <rect x="0" y="400" width="400" height="20" fill="#2e6e2e" rx="0"/>
  <path d="M 0 368 Q 0 368 20 368 L 380 368 Q 400 368 400 368 L 400 420 Q 400 420 400 420 L 0 420 Q 0 420 0 420 Z" fill="#2e6e2e"/>
  <text x="200" y="392" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="white">MAYOR 1998–2001</text>
  <text x="200" y="412" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#b8d8b8">Goofy Borneman-Calhoun · Mixed Breed</text>
</svg>
